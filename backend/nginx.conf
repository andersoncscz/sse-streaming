events { 
    worker_connections 1024; 
}

# Layer 4 (TCP/UDP) Load Balancing
stream {
    upstream tcp_backend_servers {
        server backend:8080;
        
        # Note: 'keepalive' is an HTTP directive. At Layer 4, the raw TCP 
        # connection stays open natively until closed by the client/server.
    }

    server {
        listen 80;
        
        # Blindly forward all incoming network packets to the upstream pool
        proxy_pass tcp_backend_servers;
        
        # Prevent idle streaming connections from dropping prematurely
        proxy_timeout 24h;
        proxy_connect_timeout 5s;
    }
}
